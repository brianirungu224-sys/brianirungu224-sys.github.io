 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian Mwangi</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>

    <header>
        <h1>Contact Brian Mwangi</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>
    
    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Contact Form</legend>

                <!--Full Name -->
                <p>
                    <label for="name">full name</label>
                    <input type="text" id="name" name="name" placeholder="Brian Mwangi" required>

                </p>

                <!--Email Address -->
                <p>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="brian@example.com" required>

                </p>

                <!--Phone Number -->
                <p>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="01137333304">

                </p>

                <!--Subject Dropdown -->
                <p>
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject">
                        <option value="general">General Inquiry</option>
                        <option value="project">Project Proposal</option>
                        <option value="feedback">Feedback</option>
                    </select>

                </p>

                <!--Message Textarea -->
                <p>
                    <label for="message">Message (min 50 characters):</label>
                    <textarea id="message" name="message" rows="5" maxlength="50" placeholder="Write your message here...Must be at least 50 characters long." required></textarea>

                </p>
                
                <!--Newsletter Subscription -->
                <p>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to Brian's newsletter</label>

                </p>

                <!--Submit Button -->
                <p>

                    <button type="submit">Submit</button>

                </p>

            </fieldset>
        </form>

        <section id="socil-info">
            <h2>Connect with me</h2>
            <p><strong>Location:</strong> Nairobi, Kenya (EAT / UTC+3)</p>
            <P>Find me on social media:</P>
            <ul>
                <li><a href="https://instagram.com/_its_b.r.a.y.a.n" target="_blank">Instagram</a></li>
                <li><a href="https://github.com/brianirunngu224-sys" target="_blank">GitHub profile</a></li>
                <li><a href="https://whatsapp.com/0113733304" target="_blank">WhatsApp</a></li>
            </ul>
        </section>
    </main>
 </body>
 </html>
